<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zone Calibrator — Archive-35 Riedel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; color: #eee; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }

#panel {
  width: 280px; min-width: 280px;
  background: #1a1a1a;
  border-right: 1px solid #333;
  display: flex; flex-direction: column; overflow: hidden;
}

.section { padding: 10px 12px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
.section-label { font-size: 9px; color: #555; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
h1 { font-size: 11px; color: #c8a96e; letter-spacing: 0.15em; padding: 10px 12px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }

button {
  padding: 6px 11px; font-size: 11px; font-family: monospace;
  background: #252525; border: 1px solid #3a3a3a; color: #ccc;
  cursor: pointer; border-radius: 3px; white-space: nowrap;
}
button:hover { border-color: #c8a96e; color: #fff; }
button.primary { background: #c8a96e; color: #111; border-color: #c8a96e; font-weight: bold; }
button.primary:hover { background: #d4b87a; }
button.active { border-color: #c8a96e; color: #c8a96e; background: #1f1800; }
button.danger { border-color: #e05c5c; color: #e05c5c; }
button.danger:hover { background: #e05c5c; color: #fff; }
button.small { padding: 3px 8px; font-size: 10px; }

#scene-tabs { display: flex; flex-direction: column; gap: 3px; }
.scene-tab { text-align: left; }
.scene-tab.calibrated { border-color: #4caf84; color: #4caf84; }
.scene-tab.calibrated.active { background: #0a1f15; }

#zone-list { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
.zone-item {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 7px; border-radius: 3px;
  border: 1px solid #333; font-size: 10px; cursor: pointer;
}
.zone-item:hover { border-color: #555; }
.zone-item.selected { border-color: #c8a96e; background: #1f1800; }
.zone-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.zone-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.zone-photo { font-size: 9px; color: #4caf84; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.zone-actions { display: flex; gap: 3px; flex-shrink: 0; }
.zone-del, .zone-copy { color: #555; cursor: pointer; font-size: 11px; flex-shrink: 0; padding: 0 2px; }
.zone-del:hover { color: #e05c5c; }
.zone-copy:hover { color: #c8a96e; }

#zones-scroll { flex: 1; overflow-y: auto; padding: 0 12px 10px; }
#zones-scroll::-webkit-scrollbar { width: 5px; }
#zones-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

#info { padding: 8px 12px; border-top: 1px solid #2a2a2a; font-size: 10px; color: #777; flex-shrink: 0; }
#info strong { color: #c8a96e; }

#canvas-area { flex: 1; position: relative; overflow: hidden; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }
canvas { display: block; cursor: crosshair; }
#status { position: absolute; bottom: 8px; left: 8px; font-size: 10px; color: #555; }

/* Photo picker modal */
#photo-picker { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; overflow-y: auto; padding: 40px; }
#photo-picker.open { display: block; }
#photo-picker h2 { font-size: 13px; color: #c8a96e; margin-bottom: 15px; letter-spacing: 0.1em; }
#photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.photo-thumb { cursor: pointer; border: 2px solid transparent; border-radius: 4px; overflow: hidden; aspect-ratio: 3/2; }
.photo-thumb:hover { border-color: #c8a96e; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<div id="panel">
  <h1>ZONE CALIBRATOR</h1>

  <div class="section">
    <div class="section-label">Scenes</div>
    <div id="scene-tabs"></div>
  </div>

  <div class="section">
    <div class="section-label">Tools</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;">
      <button id="btn-draw" class="active">Draw Zone</button>
      <button id="btn-save" class="primary">Save JSON</button>
      <button id="btn-load">Load JSON</button>
      <input type="file" id="json-input" accept=".json" style="display:none;">
    </div>
  </div>

  <div id="zones-scroll">
    <div class="section-label" style="padding-top:10px;">Zones</div>
    <div id="zone-list"></div>
  </div>

  <div id="info">
    Click & drag on the image to draw a zone.<br>
    Zones lock to <strong>48×32</strong> aspect ratio.<br>
    Drag inside a zone to move it. Drag ↘ handle to resize.
  </div>
</div>

<div id="canvas-area">
  <canvas id="canvas"></canvas>
  <div id="status">Ready</div>
</div>

<div id="photo-picker">
  <h2>Select Photo for Zone</h2>
  <div id="photo-grid"></div>
  <button onclick="closePicker()" style="margin-top:15px;">Cancel</button>
</div>

<script>
'use strict';

var SCENES = {
  'close-up':        { file: '../images/riedel-scenes/close-up.jpg',        label: 'Close-Up' },
  'conference-room': { file: '../images/riedel-scenes/conference-room.jpg',  label: 'Conference Room' },
  'cubicle':         { file: '../images/riedel-scenes/cubicle.jpg',          label: 'Cubicle' },
  'training-room-1': { file: '../images/riedel-scenes/training-room-1.jpg',  label: 'Training Room 1' },
  'training-room-2': { file: '../images/riedel-scenes/training-room-2.jpg',  label: 'Training Room 2' },
};

var ZONE_COLORS = ['#e8b84d','#5aaf84','#5a8faf','#af5a8f','#af8f5a','#8f5aaf','#5aafaf','#af5a5a'];
var RATIO = 32 / 48; // height / width lock

var currentSceneId = null;
var sceneData = {}; // sceneId -> { img, zones: [{id,x1,y1,x2,y2,photo,photoId}] }
var selectedZoneIdx = -1;
var allPhotos = [];

var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var canvasArea = document.getElementById('canvas-area');

// Drawing state
var mode = 'draw'; // 'draw' | 'move' | 'resize'
var drawing = false;
var drawStart = null;
var drawCurrent = null;
var dragZoneIdx = -1;
var dragOffset = null;

// Init
Object.keys(SCENES).forEach(function(id) {
  sceneData[id] = { img: null, zones: [] };
});

buildSceneTabs();
loadPhotos();
selectScene(Object.keys(SCENES)[0]);

// === SCENE TABS ===
function buildSceneTabs() {
  var el = document.getElementById('scene-tabs');
  el.innerHTML = '';
  Object.keys(SCENES).forEach(function(id) {
    var btn = document.createElement('button');
    btn.className = 'scene-tab' + (id === currentSceneId ? ' active' : '');
    if (sceneData[id].zones.length > 0) btn.classList.add('calibrated');
    btn.textContent = SCENES[id].label;
    btn.addEventListener('click', function() { selectScene(id); });
    el.appendChild(btn);
  });
}

function selectScene(id) {
  currentSceneId = id;
  selectedZoneIdx = -1;
  buildSceneTabs();
  buildZoneList();

  var sd = sceneData[id];
  if (sd.img) { fitCanvas(); render(); return; }

  var img = new Image();
  img.onload = function() { sd.img = img; fitCanvas(); render(); };
  img.onerror = function() { document.getElementById('status').textContent = 'Failed: ' + SCENES[id].file; };
  img.src = SCENES[id].file;
}

function fitCanvas() {
  var sd = sceneData[currentSceneId];
  if (!sd || !sd.img) return;
  var areaW = canvasArea.clientWidth;
  var areaH = canvasArea.clientHeight;
  var imgW = sd.img.naturalWidth;
  var imgH = sd.img.naturalHeight;
  var scale = Math.min(areaW / imgW, areaH / imgH, 1);
  canvas.width = Math.round(imgW * scale);
  canvas.height = Math.round(imgH * scale);
  canvas._scale = scale;
  canvas._imgW = imgW;
  canvas._imgH = imgH;
}

// === RENDER ===
function render() {
  var sd = sceneData[currentSceneId];
  if (!sd || !sd.img) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(sd.img, 0, 0, canvas.width, canvas.height);

  var scale = canvas._scale;

  // Draw zones
  sd.zones.forEach(function(z, i) {
    var x1 = z.x1 * scale, y1 = z.y1 * scale;
    var x2 = z.x2 * scale, y2 = z.y2 * scale;
    var w = x2 - x1, h = y2 - y1;
    var color = ZONE_COLORS[i % ZONE_COLORS.length];
    var selected = (i === selectedZoneIdx);

    ctx.strokeStyle = color;
    ctx.lineWidth = selected ? 3 : 1.5;
    ctx.setLineDash(selected ? [] : [6, 3]);
    ctx.strokeRect(x1, y1, w, h);
    ctx.setLineDash([]);

    // Label
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(x1, y1 - 16, Math.min(w, 120), 16);
    ctx.fillStyle = color;
    ctx.font = 'bold 10px monospace';
    ctx.fillText(z.id, x1 + 4, y1 - 4);

    // Resize handle (bottom-right)
    if (selected) {
      ctx.fillStyle = color;
      ctx.fillRect(x2 - 8, y2 - 8, 8, 8);
    }
  });

  // Draw preview
  if (drawing && drawStart && drawCurrent) {
    var px1 = drawStart.x * scale, py1 = drawStart.y * scale;
    var pw = (drawCurrent.x - drawStart.x) * scale;
    var ph = (drawCurrent.y - drawStart.y) * scale;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(px1, py1, pw, ph);
    ctx.setLineDash([]);
  }

  document.getElementById('status').textContent = currentSceneId + ' — ' + sd.zones.length + ' zone(s)' + (sd.img ? ' — ' + sd.img.naturalWidth + '×' + sd.img.naturalHeight : '');
}

// === ZONE LIST ===
function buildZoneList() {
  var el = document.getElementById('zone-list');
  el.innerHTML = '';
  var sd = sceneData[currentSceneId];
  if (!sd) return;
  sd.zones.forEach(function(z, i) {
    var div = document.createElement('div');
    div.className = 'zone-item' + (i === selectedZoneIdx ? ' selected' : '');
    var color = ZONE_COLORS[i % ZONE_COLORS.length];
    var photoLabel = z.photo ? z.photo : '';
    div.innerHTML = '<div class="zone-dot" style="background:' + color + '"></div>' +
      '<span class="zone-label">' + z.id + '</span>' +
      (photoLabel ? '<span class="zone-photo">' + photoLabel + '</span>' : '') +
      '<div class="zone-actions">' +
      '<span class="zone-copy" title="Copy Zone">\u29C9</span>' +
      '<span class="zone-del" title="Delete">\u2715</span>' +
      '</div>';
    div.addEventListener('click', function(e) {
      if (e.target.classList.contains('zone-del')) { deleteZone(i); return; }
      if (e.target.classList.contains('zone-copy')) { copyZone(i); return; }
      selectedZoneIdx = i;
      buildZoneList();
      render();
    });
    div.addEventListener('dblclick', function() { openPicker(i); });
    el.appendChild(div);
  });
}

function deleteZone(idx) {
  sceneData[currentSceneId].zones.splice(idx, 1);
  if (selectedZoneIdx >= sceneData[currentSceneId].zones.length) selectedZoneIdx = -1;
  buildZoneList(); buildSceneTabs(); render();
}

function copyZone(idx) {
  var sd = sceneData[currentSceneId];
  var orig = sd.zones[idx];
  var copy = JSON.parse(JSON.stringify(orig));
  copy.id = orig.id + '_copy';
  copy.x1 += 20; copy.y1 += 20;
  copy.x2 += 20; copy.y2 += 20;
  copy.photo = null;
  copy.photoId = null;
  sd.zones.push(copy);
  selectedZoneIdx = sd.zones.length - 1;
  buildZoneList(); buildSceneTabs(); render();
}

// === MOUSE EVENTS ===
function canvasToScene(e) {
  var rect = canvas.getBoundingClientRect();
  var scale = canvas._scale || 1;
  return {
    x: (e.clientX - rect.left) / scale,
    y: (e.clientY - rect.top) / scale
  };
}

canvas.addEventListener('mousedown', function(e) {
  var p = canvasToScene(e);
  var sd = sceneData[currentSceneId];

  // Check resize handle on selected zone
  if (selectedZoneIdx >= 0) {
    var z = sd.zones[selectedZoneIdx];
    if (Math.abs(p.x - z.x2) < 12 && Math.abs(p.y - z.y2) < 12) {
      mode = 'resize';
      drawing = true;
      dragZoneIdx = selectedZoneIdx;
      return;
    }
  }

  // Check if clicking inside a zone (move)
  for (var i = sd.zones.length - 1; i >= 0; i--) {
    var z = sd.zones[i];
    if (p.x >= z.x1 && p.x <= z.x2 && p.y >= z.y1 && p.y <= z.y2) {
      selectedZoneIdx = i;
      mode = 'move';
      drawing = true;
      dragZoneIdx = i;
      dragOffset = { x: p.x - z.x1, y: p.y - z.y1 };
      buildZoneList();
      render();
      return;
    }
  }

  // Draw new zone
  mode = 'draw';
  drawing = true;
  drawStart = p;
  drawCurrent = { x: p.x, y: p.y + (0) };
});

canvas.addEventListener('mousemove', function(e) {
  if (!drawing) return;
  var p = canvasToScene(e);
  var sd = sceneData[currentSceneId];

  if (mode === 'draw') {
    var w = p.x - drawStart.x;
    if (w < 10) w = 10;
    var h = w * RATIO;
    drawCurrent = { x: drawStart.x + w, y: drawStart.y + h };
    render();
  } else if (mode === 'move' && dragZoneIdx >= 0) {
    var z = sd.zones[dragZoneIdx];
    var w = z.x2 - z.x1;
    var h = z.y2 - z.y1;
    z.x1 = p.x - dragOffset.x;
    z.y1 = p.y - dragOffset.y;
    z.x2 = z.x1 + w;
    z.y2 = z.y1 + h;
    render();
  } else if (mode === 'resize' && dragZoneIdx >= 0) {
    var z = sd.zones[dragZoneIdx];
    var newW = p.x - z.x1;
    if (newW < 20) newW = 20;
    z.x2 = z.x1 + newW;
    z.y2 = z.y1 + newW * RATIO;
    render();
  }
});

canvas.addEventListener('mouseup', function(e) {
  if (!drawing) return;
  drawing = false;
  var sd = sceneData[currentSceneId];

  if (mode === 'draw' && drawStart && drawCurrent) {
    var w = drawCurrent.x - drawStart.x;
    if (w > 15) {
      var h = w * RATIO;
      var id = prompt('Zone name (e.g. left_wall, center, right_wall):');
      if (id && id.trim()) {
        sd.zones.push({
          id: id.trim(),
          x1: Math.round(drawStart.x), y1: Math.round(drawStart.y),
          x2: Math.round(drawStart.x + w), y2: Math.round(drawStart.y + h),
          photo: null, photoId: null
        });
        selectedZoneIdx = sd.zones.length - 1;
        buildZoneList(); buildSceneTabs();
      }
    }
  }

  drawStart = null; drawCurrent = null;
  dragZoneIdx = -1; dragOffset = null;
  mode = 'draw';
  render();
});

// === PHOTO PICKER ===
var pickerZoneIdx = -1;

function loadPhotos() {
  fetch('../data/photos.json')
    .then(function(r) { return r.json(); })
    .then(function(data) { allPhotos = data.photos || data; })
    .catch(function() { console.warn('Could not load photos.json'); });
}

function openPicker(zoneIdx) {
  pickerZoneIdx = zoneIdx;
  var grid = document.getElementById('photo-grid');
  grid.innerHTML = '';
  allPhotos.forEach(function(p) {
    var div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = '<img src="../' + p.thumbnail + '" loading="lazy">';
    div.addEventListener('click', function() {
      var sd = sceneData[currentSceneId];
      sd.zones[pickerZoneIdx].photo = p.title;
      sd.zones[pickerZoneIdx].photoId = p.id;
      closePicker();
      buildZoneList();
    });
    grid.appendChild(div);
  });
  document.getElementById('photo-picker').classList.add('open');
}

function closePicker() {
  document.getElementById('photo-picker').classList.remove('open');
  pickerZoneIdx = -1;
}

// === SAVE / LOAD ===
document.getElementById('btn-save').addEventListener('click', function() {
  var output = {};
  Object.keys(SCENES).forEach(function(id) {
    var sd = sceneData[id];
    output[id] = {
      scene: SCENES[id].file.split('/').pop(),
      zones: sd.zones.map(function(z) {
        var cx = (z.x1 + z.x2) / 2;
        var cy = (z.y1 + z.y2) / 2;
        var imgW = sd.img ? sd.img.naturalWidth : 1536;
        var imgH = sd.img ? sd.img.naturalHeight : 1024;
        return {
          id: z.id,
          photo: z.photo || null,
          photoId: z.photoId || null,
          position: { x: +(z.x1 / imgW).toFixed(4), y: +(z.y1 / imgH).toFixed(4) },
          size: { width: +((z.x2 - z.x1) / imgW).toFixed(4), height: +((z.y2 - z.y1) / imgH).toFixed(4) },
          centerPct: { x: +(cx / imgW).toFixed(4), y: +(cy / imgH).toFixed(4) },
          pixelCoords: { x1: Math.round(z.x1), y1: Math.round(z.y1), x2: Math.round(z.x2), y2: Math.round(z.y2) },
          ref: { widthInches: 48, heightInches: 32 }
        };
      })
    };
  });
  var blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'riedel-zones.json';
  a.click();
});

document.getElementById('btn-load').addEventListener('click', function() {
  document.getElementById('json-input').click();
});

document.getElementById('json-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      Object.keys(data).forEach(function(id) {
        if (!sceneData[id]) return;
        sceneData[id].zones = (data[id].zones || []).map(function(z) {
          return {
            id: z.id,
            x1: z.pixelCoords.x1, y1: z.pixelCoords.y1,
            x2: z.pixelCoords.x2, y2: z.pixelCoords.y2,
            photo: z.photo || null,
            photoId: z.photoId || null
          };
        });
      });
      buildSceneTabs(); buildZoneList(); render();
      document.getElementById('status').textContent = 'Loaded zones from ' + file.name;
    } catch (err) {
      alert('Invalid JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// Resize handler
window.addEventListener('resize', function() { if (sceneData[currentSceneId]) { fitCanvas(); render(); } });
</script>
</body>
</html>
